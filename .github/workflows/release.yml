name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build the release for (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  BIN_NAME: ghc-proxy
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          staging="${BIN_NAME}-${tag}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || true
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          staging="${BIN_NAME}-${tag}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          7z a "${staging}.zip" "$staging"
          echo "ASSET=${staging}.zip" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: artifacts/*
