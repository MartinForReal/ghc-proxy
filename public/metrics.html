<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ghc-proxy · Metrics</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 2rem; background: #0d1117; color: #e6edf3; }
    h1 { font-size: 1.4rem; margin: 0 0 1rem; }
    a { color: #58a6ff; }
    .toolbar { display: grid; grid-template-columns: 1fr auto auto auto; gap: 0.6rem; margin-bottom: 1rem; }
    input, button { background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 0.5rem 0.75rem; }
    button { cursor: pointer; }
    .note { color: #8b949e; margin: 0.5rem 0 1rem; font-size: 0.9rem; }
    table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 0.45rem 0.6rem; border-bottom: 1px solid #30363d; font-size: 0.85rem; }
    th { color: #8b949e; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .right { text-align: right; }
    .small { font-size: 0.8rem; color: #8b949e; }
  </style>
</head>
<body>
  <h1>OpenMetrics Explorer <a href="/" style="font-size:0.8rem">← Dashboard</a></h1>
  <div class="toolbar">
    <input id="filter" placeholder="Filter by metric name / label (e.g. requests_total or endpoint=\"/v1/messages\")" />
    <button id="refresh">Refresh</button>
    <button id="reloadCfg">Reload config</button>
    <button id="copyRaw">Copy raw</button>
  </div>
  <div class="note" id="meta">Loading metrics...</div>
  <table>
    <thead>
      <tr><th>Metric</th><th>Labels</th><th class="right">Value</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <p class="small">Raw exporter: <a href="/metrics" target="_blank">/metrics</a></p>

  <script>
    let allRows = [];
    let rawText = '';

    function parseMetrics(text) {
      const rows = [];
      const lines = text.split(/\r?\n/);
      for (const line of lines) {
        const l = line.trim();
        if (!l || l.startsWith('#')) continue;
        const m = l.match(/^([a-zA-Z_:][a-zA-Z0-9_:]*)(\{[^}]*\})?\s+(.+)$/);
        if (!m) continue;
        rows.push({
          name: m[1],
          labels: (m[2] || '').replace(/^\{|\}$/g, ''),
          value: m[3]
        });
      }
      return rows;
    }

    function render() {
      const q = document.getElementById('filter').value.trim().toLowerCase();
      const filtered = !q
        ? allRows
        : allRows.filter(r => (
            r.name.toLowerCase().includes(q) ||
            r.labels.toLowerCase().includes(q) ||
            r.value.toLowerCase().includes(q)
          ));

      document.getElementById('rows').innerHTML = filtered.map(r => `
        <tr>
          <td class="mono">${escapeHtml(r.name)}</td>
          <td class="mono">${escapeHtml(r.labels || '-')}</td>
          <td class="mono right">${escapeHtml(r.value)}</td>
        </tr>
      `).join('');

      document.getElementById('meta').textContent =
        `Showing ${filtered.length} / ${allRows.length} metrics`;
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    async function refresh() {
      const res = await fetch('/metrics');
      rawText = await res.text();
      allRows = parseMetrics(rawText);
      render();
    }

    async function reloadConfig() {
      const res = await fetch('/api/config/reload', { method: 'POST' });
      const data = await res.json();
      const d = data && data.config ? data.config : {};
      alert(`Config reloaded\n\npath: ${data.config_path || '-'}\ndebug: ${d.debug}\naccount_type: ${d.account_type}\nmax_connection_retries: ${d.max_connection_retries}`);
    }

    async function copyRaw() {
      await navigator.clipboard.writeText(rawText || '');
    }

    document.getElementById('refresh').onclick = refresh;
    document.getElementById('reloadCfg').onclick = reloadConfig;
    document.getElementById('copyRaw').onclick = copyRaw;
    document.getElementById('filter').oninput = render;

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
