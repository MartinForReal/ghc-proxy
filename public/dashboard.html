<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ghc-proxy · Dashboard</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 2rem; background: #0d1117; color: #e6edf3; }
    h1 { font-size: 1.4rem; margin: 0 0 1rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; }
    .card .label { color: #8b949e; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 1.6rem; font-weight: 600; margin-top: 0.25rem; }
    a { color: #58a6ff; }
    .links { margin-top: 1rem; }
    h2 { font-size: 1.1rem; margin: 1.5rem 0 0.75rem; }
    table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #30363d; font-size: 0.9rem; }
    th { color: #8b949e; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <h1>GitHub Copilot API Proxy</h1>
  <div class="cards" id="cards"></div>
  <h2 id="models-title">Supported models</h2>
  <table id="models">
    <thead><tr><th>ID</th><th>Display name</th><th>Owned by</th></tr></thead>
    <tbody id="models-body"></tbody>
  </table>
  <div class="links"><a href="/requests">Browse requests →</a></div>
  <script>
    async function refresh() {
      try {
        const res = await fetch('/api/stats');
        const s = await res.json();
        const cards = [
          ['Requests', s.request_count],
          ['Input tokens', s.total_input_tokens],
          ['Output tokens', s.total_output_tokens],
          ['Bytes sent', s.bytes_sent],
          ['Bytes received', s.bytes_received],
        ];
        document.getElementById('cards').innerHTML = cards.map(
          ([label, value]) => `<div class="card"><div class="label">${label}</div><div class="value">${value ?? 0}</div></div>`
        ).join('');
      } catch (e) {
        console.error(e);
      }
    }
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }
    async function loadModels() {
      try {
        const res = await fetch('/api/models');
        const data = await res.json();
        const models = (data && data.data) || [];
        document.getElementById('models-title').textContent =
          `Supported models (${models.length})`;
        document.getElementById('models-body').innerHTML = models.map(m =>
          `<tr><td>${escapeHtml(m.id)}</td><td>${escapeHtml(m.display_name)}</td><td>${escapeHtml(m.owned_by)}</td></tr>`
        ).join('');
      } catch (e) {
        console.error(e);
      }
    }
    refresh();
    loadModels();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
